version: '3.8'

services:
  frontend:
    build:
      context: .
      target: frontend-builder
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://backend:3001
    depends_on:
      - backend
    networks:
      - caneiq-network

  backend:
    build:
      context: .
      target: backend
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - CORS_ORIGIN=http://frontend:3000
    volumes:
      - backend_data:/app/data
    networks:
      - caneiq-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  ai-module:
    build:
      context: .
      target: ai-module
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - BACKEND_URL=http://backend:3001
      - SIMULATION_MODE=true
    depends_on:
      - backend
    networks:
      - caneiq-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  edge-simulation:
    build:
      context: .
      target: edge-simulation
    environment:
      - BACKEND_URL=http://backend:3001
      - SIMULATION_INTERVAL=2000
    depends_on:
      - backend
      - ai-module
    networks:
      - caneiq-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - backend
    networks:
      - caneiq-network

volumes:
  backend_data:
    driver: local

networks:
  caneiq-network:
    driver: bridge
